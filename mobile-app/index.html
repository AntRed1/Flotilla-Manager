<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — crítico para móvil y Capacitor -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Favicon — usa el PNG real que tienes -->
    <link rel="icon" type="image/png" sizes="32x32"   href="/icon-29x29.png" />
    <link rel="icon" type="image/png" sizes="96x96"   href="/icon-80x80.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="/icon-180x180.png" />

    <!-- Apple PWA -->
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color -->
    <meta name="theme-color" content="#22c55e" />
    <meta name="msapplication-TileColor" content="#22c55e" />

    <!-- PWA / iOS standalone -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flotilla" />

    <!-- SEO básico -->
    <meta name="description" content="Control de gastos de combustible para tarjetas Flotilla" />
    <meta name="application-name" content="Flotilla Manager" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph (por si se comparte el link) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Flotilla Manager" />
    <meta property="og:description" content="Control de gastos de combustible" />
    <meta property="og:image"       content="/icon-1024.png" />

    <title>Flotilla Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
