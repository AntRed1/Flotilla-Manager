version: '3.8'

services:

  # ── MySQL 8 ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: flotilla_db
      MYSQL_USER: flotilla
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flotilla", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    image: antred1/flotilla-backend:${DOCKER_IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
      AZURE_KEYVAULT_ENDPOINT: ${AZURE_KEYVAULT_ENDPOINT}
      STORAGE_PROVIDER: azure
      AZURE_STORAGE_CONTAINER_NAME: receipts
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
