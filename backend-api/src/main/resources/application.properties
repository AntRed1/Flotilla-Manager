# ===========================
# APPLICATION
# ===========================
spring.application.name=flotilla-backend
server.port=8080
server.servlet.context-path=/api

spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ===========================
# DATABASE
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://flotilla-db-ukuy.mysql.database.azure.com:3306/flotilla_db?useSSL=false&serverTimezone=America/Santo_Domingo&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci}
spring.datasource.username=${DB_USERNAME:flotillaadmin}
spring.datasource.password=${DB_PASSWORD:@Emulador1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=FlotillaHikariCP

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Santo_Domingo
spring.jpa.open-in-view=false

# ===========================
# JWT SECURITY
# ===========================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===========================
# FILE UPLOAD
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.allowed-types=image/jpeg,image/png,image/webp,image/gif

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://localhost,capacitor://localhost,http://10.0.2.2:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
app.cors.max-age=3600

# ===========================
# ACTUATOR
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===========================
# LOGGING
# ===========================
logging.level.com.flotilla.manager=DEBUG
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=ERROR

# ===========================
# STORAGE PROVIDER
# ===========================
app.storage.provider=${STORAGE_PROVIDER:local}
app.storage.sas-expiry-hours=${SAS_EXPIRY_HOURS:1}

azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:receipts}

# ===========================
# AZURE KEY VAULT
# CRÍTICO: desactivado por defecto aquí.
# Se activa ÚNICAMENTE en application-prod.properties.
# Esto evita que la app crashee en local o si el vault no está disponible.
# ===========================
spring.cloud.azure.keyvault.secret.enabled=false