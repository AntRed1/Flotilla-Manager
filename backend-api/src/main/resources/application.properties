# ===========================
# APPLICATION
# ===========================
spring.application.name=flotilla-backend
server.port=8080
server.servlet.context-path=/api

# Profile activo por defecto → se sobreescribe con SPRING_PROFILES_ACTIVE
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===========================
# DATABASE
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flotilla_db?useSSL=false&serverTimezone=America/Santo_Domingo&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=FlotillaHikariCP

# ===========================
# JPA / HIBERNATE
# ===========================
# FIX: "update" solo en dev. Prod usa "validate" (definido en application-prod.properties).
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Santo_Domingo
spring.jpa.open-in-view=false

# ===========================
# JWT SECURITY
# ===========================
# FIX: sin valor por defecto en producción — si JWT_SECRET no está definido, la app no arranca.
# En local define JWT_SECRET en tu .env o variable de entorno.
# El secret debe tener mínimo 32 caracteres para HS256.
app.jwt.secret=${JWT_SECRET}

# FIX: access token reducido a 15 minutos (900000 ms) para producción.
# En local puedes sobreescribir con JWT_ACCESS_EXPIRATION=86400000 en .env si prefieres 24h.
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}

# Refresh token: 7 días
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===========================
# FILE UPLOAD
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.allowed-types=image/jpeg,image/png,image/webp,image/gif

# ===========================
# CORS
# FIX: headers explícitos en lugar de "*" para compatibilidad con credentials=true
# ===========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://localhost,capacitor://localhost,http://10.0.2.2:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
app.cors.max-age=3600

# ===========================
# ACTUATOR
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===========================
# LOGGING
# ===========================
logging.level.com.flotilla.manager=DEBUG
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=ERROR

# ===========================
# STORAGE PROVIDER
# ===========================
app.storage.provider=${STORAGE_PROVIDER:local}
app.storage.sas-expiry-hours=${SAS_EXPIRY_HOURS:1}

# Azure Blob Storage
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:receipts}

# ===========================
# AZURE KEY VAULT — desactivado por defecto
# Se activa solo en el profile "prod"
# ===========================
spring.cloud.azure.keyvault.secret.enabled=false