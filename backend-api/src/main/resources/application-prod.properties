# ===========================
# PRODUCCIÓN — Spring profile "prod"
# Sobreescribe application.properties cuando SPRING_PROFILES_ACTIVE=prod
#
# Los secrets llegan como variables de entorno desde Azure App Settings.
# Key Vault desactivado — no disponible en este tenant.
# ===========================

# Key Vault DESACTIVADO (política corporativa)
spring.cloud.azure.keyvault.secret.enabled=false

# JPA — no modificar schema en prod
spring.jpa.hibernate.ddl-auto=update

# Logging reducido
logging.level.com.flotilla.manager=INFO
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=ERROR

# Actuator
management.endpoint.health.show-details=never