# =====================================================================
# PROFILE: prod
# Se activa con: SPRING_PROFILES_ACTIVE=prod
# En Azure App Service se define en: Configuration → Application Settings
# =====================================================================

# ── Azure Key Vault ──────────────────────────────────────────────────
# Spring Cloud Azure lee los secretos del vault ANTES de que el
# contexto de la app arranque, y los expone como Spring properties.
#
# El nombre de cada secret en Key Vault debe usar guiones, NO underscores:
#   DB-URL            → resuelve ${DB_URL}
#   DB-USERNAME       → resuelve ${DB_USERNAME}
#   DB-PASSWORD       → resuelve ${DB_PASSWORD}
#   JWT-SECRET        → resuelve ${JWT_SECRET}
#   AZURE-STORAGE-CONNECTION-STRING
#   CORS-ORIGINS
#
# Autenticación: Managed Identity del App Service (sin credenciales).
# Requiere que el App Service tenga System Assigned Identity habilitada
# y rol "Key Vault Secrets User" asignado en el vault.
spring.cloud.azure.keyvault.secret.enabled=true
spring.cloud.azure.keyvault.secret.endpoint=${AZURE_KEYVAULT_ENDPOINT}
spring.cloud.azure.keyvault.secret.property-source-enabled=true

# ── JPA — producción ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Storage — siempre Azure en prod ──────────────────────────────────
app.storage.provider=azure

# ── Logging — menos verbose en prod ──────────────────────────────────
logging.level.com.flotilla.manager=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# ── CORS — dominio de producción ─────────────────────────────────────
# En Key Vault guarda el secret "CORS-ORIGINS" con la URL real del frontend
app.cors.allowed-origins=${CORS_ORIGINS}
